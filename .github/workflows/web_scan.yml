name: "Scanner de Vulnérabilités Web Complet"

on:
  repository_dispatch:
    types: [web_scan_event]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Scan Nuclei
        uses: projectdiscovery/nuclei-action@main
        with:
          target: ${{ github.event.client_payload.url }}
          output: nuclei_report.txt

      - name: Scan OWASP ZAP
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ github.event.client_payload.url }}
          artifact_name: 'zap_report'

      - name: Archive des rapports Nuclei
        uses: actions/upload-artifact@v4
        with:
          name: rapport-nuclei
          path: nuclei_report.txt
