name: "Scanner de Vulnérabilités Web Complet"

on:
  repository_dispatch:
    types: [web_scan_event]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Scan Nuclei (Vérification CVE)
        uses: projectdiscovery/nuclei-action@main
        with:
          target: ${{ github.event.client_payload.url }}
          output: nuclei_results.txt

      - name: Scan OWASP ZAP (Audit Dynamique)
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ github.event.client_payload.url }}
          cmd_options: '-J report_zap.json'

      - name: Création du Rapport Unifié PFE
        run: |
          echo "# RAPPORT D'AUDIT DE SÉCURITÉ - PLATEFORME OFFENSIVE" > Rapport_PFE.md
          echo "## Cible : ${{ github.event.client_payload.url }}" >> Rapport_PFE.md
          echo "---" >> Rapport_PFE.md
          echo "### 1. Résultats Nuclei (Signatures & CVE)" >> Rapport_PFE.md
          if [ -f nuclei_results.txt ]; then cat nuclei_results.txt >> Rapport_PFE.md; else echo "Aucune vulnérabilité critique détectée par Nuclei." >> Rapport_PFE.md; fi
          echo "" >> Rapport_PFE.md
          echo "### 2. Résultats OWASP ZAP (Audit Dynamique)" >> Rapport_PFE.md
          echo "L'audit dynamique a été complété. Les détails techniques sont disponibles dans le fichier report_zap.json joint." >> Rapport_PFE.md

      - name: Archive du Rapport Final
        uses: actions/upload-artifact@v4
        with:
          name: Rapport-Audit-Final
          path: |
            Rapport_PFE.md
            report_zap.json
